<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leroy Exel</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0f1724',
            muted: '#9aa4b2',
            accent: '#60a5fa',
            text: '#e6eef8'
          },
          keyframes: {
            bounceX: {
              '0%, 100%': { left: '0%' },
              '50%': { left: 'calc(100% - 4rem)' },
            },
          },
          animation: {
            bounceX: 'bounceX 3s ease-in-out forwards',
          },
        }
      }
    };
  </script>

  <style>
    /* ── Shared sidebar styles ── */
    #mobile-menu, #mobile-menu * {
      font-family: 'Nunito', sans-serif !important;
    }
    #mobile-menu .project-link {
      background: rgba(96, 165, 250, 0.12);
      border-color: rgba(96, 165, 250, 0.30);
      color: #60a5fa;
      font-weight: 800;
      transition: all 0.25s ease;
      letter-spacing: 0.02em;
    }
    #mobile-menu .project-link:hover {
      background: rgba(96, 165, 250, 0.25);
      border-color: #60a5fa;
      transform: translateX(4px);
      box-shadow: 0 0 20px rgba(96, 165, 250, 0.15);
    }
    #mobile-menu .nav-link {
      font-weight: 700;
      letter-spacing: 0.01em;
    }
    #mobile-menu .nav-link:hover {
      color: #60a5fa;
      background: rgba(255, 255, 255, 0.06);
    }
    #mobile-menu .section-label {
      font-weight: 900;
      letter-spacing: 0.08em;
      color: #9aa4b2;
    }

    /* ── Global content transition ── */
    #main-content {
      transition: opacity 0.2s ease;
    }
    #main-content.swapping {
      opacity: 0.4;
    }

    /* ── Shared page styles ── */
    .skill-tag {
      transition: all 0.2s ease;
    }
    .skill-tag:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(96, 165, 250, 0.25);
    }
    .contact-card {
      transition: all 0.3s ease;
    }
    .contact-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(96, 165, 250, 0.15);
    }
    .form-input {
      transition: all 0.2s ease;
    }
    .form-input:focus {
      outline: none;
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
    }
    @font-face {
      font-family: "RecoilFont";
      src: url("./Projects/RecoilAssets/RecoilFont.TTF") format("truetype");
    }
    .recoil-font {
      font-family: "RecoilFont", sans-serif;
    }

    /* ── Projects modal / lightbox ── */
    .mod-card {
      transition: all 0.3s ease;
      cursor: pointer;
    }
    .mod-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 40px rgba(96, 165, 250, 0.15);
    }
    .mod-tag {
      transition: all 0.2s ease;
    }
    .mod-tag:hover {
      transform: scale(1.05);
    }
    .modal-overlay {
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
    }
    .modal-content {
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-content::-webkit-scrollbar {
      width: 6px;
    }
    .modal-content::-webkit-scrollbar-track {
      background: #0a1530;
      border-radius: 10px;
    }
    .modal-content::-webkit-scrollbar-thumb {
      background: #60a5fa;
      border-radius: 10px;
    }
    #lightbox {
      background: rgba(0, 0, 0, 0.92);
      backdrop-filter: blur(8px);
    }
    #lightbox .lb-close {
      background: rgba(220, 38, 38, 0.9);
      border: 2px solid rgba(255, 255, 255, 0.3);
      transition: all 0.15s ease;
    }
    #lightbox .lb-close:hover {
      background: rgb(220, 38, 38);
      transform: scale(1.05);
    }
    #lightbox .lb-nav-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: all 0.15s ease;
    }
    #lightbox .lb-nav-btn:hover {
      background: rgba(96, 165, 250, 0.25);
      border-color: rgba(96, 165, 250, 0.4);
    }
    #lb-media-wrap video,
    #lb-media-wrap img {
      max-height: 84vh;
      max-width: 100%;
      border-radius: 12px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      object-fit: contain;
    }
    #lb-media-wrap video {
      background: #000;
    }
    #lb-counter {
      font-size: 10px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      color: #9aa4b2;
      background: rgba(0, 0, 0, 0.5);
      padding: 2px 10px;
      border-radius: 20px;
    }
    #lb-caption {
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      color: #9aa4b2;
      text-align: center;
      max-width: 90%;
      margin-top: 12px;
    }
    .media-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #9aa4b2;
      margin-bottom: 4px;
      display: block;
    }
  </style>
</head>

<body class="min-h-screen text-white flex bg-linear-to-b from-[#0f2b72] to-[#071025] text-text font-sans relative">

  <!-- PARTICLES BACKGROUND -->
  <div id="particles-js" aria-hidden="true" class="fixed inset-0 z-0 pointer-events-none opacity-90"></div>

  <!-- MOBILE MENU BUTTON -->
  <button id="menuBtn" onclick="toggleMenu()" class="fixed top-4 left-4 z-50 md:hidden bg-white/10 border border-white/10 rounded-xl p-2 backdrop-blur-md text-[#60a5fa]">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  </button>

  <!-- MOBILE OVERLAY -->
  <div id="mobile-overlay" onclick="toggleMenu()" class="fixed inset-0 z-30 bg-black/60 backdrop-blur-sm md:hidden hidden"></div>

  <!-- SIDEBAR INJECTION POINT -->
  <div id="sidebar-container"></div>

  <!-- MAIN CONTENT -->
  <main class="flex-1 flex items-center justify-center p-6 md:p-12 relative z-20">
    <div id="main-content" class="w-full max-w-3xl transition-opacity duration-200">
      <!-- content swapped here -->
    </div>
  </main>

  <!-- ─── GLOBAL MODAL (Projects) ─── -->
  <div id="modModal" class="fixed inset-0 z-50 hidden modal-overlay flex items-center justify-center p-4 transition-opacity duration-300">
    <div class="modal-content bg-[#0a1a45]/95 border border-white/10 rounded-2xl max-w-2xl w-full p-6 md:p-8 shadow-2xl backdrop-blur-sm relative">
      <button onclick="closeModal()" class="absolute top-4 right-4 text-muted hover:text-white transition-colors text-2xl leading-none">&times;</button>
      <div id="modalVideoContainer" class="hidden mb-4">
        <span class="media-label">🎬 Final Result</span>
        <div onclick="openLightboxFromModal('video')" class="cursor-zoom-in group relative rounded-xl overflow-hidden border border-white/10 hover:border-accent/50 transition-colors">
          <video id="modalVideo" autoplay muted loop playsinline class="w-full rounded-xl border border-white/10 pointer-events-none">
            <source src="" type="video/mp4" />
          </video>
          <div class="absolute inset-0 pointer-events-none flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
            <div class="bg-[#0a1530]/80 p-3 rounded-full border border-white/10 shadow-lg">
              <svg class="w-8 h-8 text-[#60a5fa]" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>
          <div class="absolute bottom-0 left-0 right-0 bg-[#0a1530]/80 px-3 py-1.5 text-[10px] font-mono text-[#9aa4b2]">Click to enlarge</div>
        </div>
      </div>
      <div id="modalReviewContainer" class="hidden mb-4">
        <span class="media-label">⭐ Review</span>
        <div onclick="openLightboxFromModal('review')" class="cursor-zoom-in group relative rounded-xl overflow-hidden border border-white/10 hover:border-accent/50 transition-colors">
          <img id="modalReviewImage" src="" alt="Review screenshot" class="w-full rounded-xl border border-white/10 pointer-events-none" />
          <div class="absolute inset-0 pointer-events-none flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
            <div class="bg-[#0a1530]/80 p-3 rounded-full border border-white/10 shadow-lg">
              <svg class="w-8 h-8 text-[#60a5fa]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
            </div>
          </div>
          <div class="absolute bottom-0 left-0 right-0 bg-[#0a1530]/80 px-3 py-1.5 text-[10px] font-mono text-[#9aa4b2]">Click to enlarge</div>
        </div>
      </div>
      <div id="modalBody">
        <h2 id="modalTitle" class="text-2xl font-bold text-accent mb-2"></h2>
        <div id="modalEngine" class="text-xs font-mono text-muted mb-4"></div>
        <div id="modalDescription" class="text-sm text-[#e6eef8] leading-relaxed space-y-3"></div>
        <div id="modalTags" class="flex flex-wrap gap-2 mt-4"></div>
        <div id="modalExtra" class="mt-4 text-muted text-sm border-t border-white/10 pt-4"></div>
      </div>
    </div>
  </div>

  <!-- ─── GLOBAL LIGHTBOX (Projects) ─── -->
  <div id="lightbox" class="hidden fixed inset-0 z-[60] bg-black/92 backdrop-blur-sm items-center justify-center p-0" onclick="if(event.target===this)closeLightbox()">
    <div class="relative flex flex-col items-center" style="width:100vw;max-width:100vw;padding:0 8px;" onclick="event.stopPropagation()">
      <button onclick="closeLightbox()" class="fixed top-4 right-4 z-[70] text-white text-lg font-bold w-9 h-9 flex items-center justify-center leading-none rounded-full bg-red-600 hover:bg-red-500 border-2 border-white/30 shadow-lg transition-all duration-150 cursor-pointer" style="line-height:1;padding-bottom:1px">&times;</button>
      <div id="lb-counter" class="absolute -top-4 left-0 text-[10px] font-mono text-[#9aa4b2] bg-black/50 px-2 py-1 rounded-full"></div>
      <div class="flex items-center gap-2 sm:gap-4 w-full">
        <button id="lb-prev" onclick="lbNav(-1)" class="flex-shrink-0 w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center rounded-full bg-white/10 hover:bg-[#60a5fa]/30 border border-white/20 text-white transition-all duration-150 cursor-pointer" title="Previous">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/></svg>
        </button>
        <div id="lb-media-wrap" class="flex-1 min-w-0 flex items-center justify-center rounded-lg overflow-hidden"></div>
        <button id="lb-next" onclick="lbNav(1)" class="flex-shrink-0 w-10 h-10 sm:w-12 sm:h-12 flex items-center justify-center rounded-full bg-white/10 hover:bg-[#60a5fa]/30 border border-white/20 text-white transition-all duration-150 cursor-pointer" title="Next">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/></svg>
        </button>
      </div>
      <div id="lb-caption" class="mt-3 text-center text-xs font-mono text-[#9aa4b2] max-w-2xl px-2"></div>
    </div>
  </div>

  <script>
    // ─── ROUTER ──────────────────────────────────────────────────────────
    const ROUTES = {
      'about': 'pages/about.html',
      'projects': 'pages/projects.html',
      'contact': 'pages/contact.html',
    };
    const DEFAULT_ROUTE = 'about';
    let currentRoute = DEFAULT_ROUTE;

    // ─── SIDEBAR ──────────────────────────────────────────────────────────
    async function loadSidebar() {
      const res = await fetch('sidebar.html');
      if (!res.ok) throw new Error('Sidebar not found');
      const html = await res.text();
      document.getElementById('sidebar-container').innerHTML = html;
      // bind SPA nav links
      document.querySelectorAll('#mobile-menu a[data-route]').forEach(link => {
        link.addEventListener('click', (e) => {
          e.preventDefault();
          navigateTo(link.getAttribute('data-route'));
        });
      });
      highlightNav(currentRoute);
    }

    function highlightNav(route) {
      document.querySelectorAll('#mobile-menu a[data-route]').forEach(link => {
        const r = link.getAttribute('data-route');
        link.classList.remove('text-accent', 'bg-white/5');
        link.classList.add('text-muted');
        if (r === route) link.classList.add('text-accent', 'bg-white/5');
      });
    }

    // ─── CONTENT LOADER ──────────────────────────────────────────────────
    const contentEl = document.getElementById('main-content');

    async function loadContent(route) {
      const url = ROUTES[route];
      if (!url) return;
      contentEl.classList.add('swapping');
      try {
        const res = await fetch(url);
        if (!res.ok) throw new Error('Content not found');
        const html = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, 'text/html');
        const bodyContent = doc.body ? doc.body.innerHTML : html;

        // extract scripts
        const scripts = [];
        doc.querySelectorAll('script').forEach(s => {
          if (s.src) scripts.push({ src: s.src, inline: null });
          else scripts.push({ src: null, inline: s.textContent });
        });

        contentEl.innerHTML = bodyContent;

        // execute scripts
        scripts.forEach(s => {
          const script = document.createElement('script');
          if (s.src) { script.src = s.src; script.async = false; }
          else if (s.inline) script.textContent = s.inline;
          if (s.src || s.inline) {
            document.body.appendChild(script);
            if (!s.src) document.body.removeChild(script);
            else {
              script.onload = () => { if (script.parentNode) script.parentNode.removeChild(script); };
              script.onerror = () => { if (script.parentNode) script.parentNode.removeChild(script); };
            }
          }
        });

        // page‑specific initialisation
        if (route === 'projects') initProjectsPage();
        if (route === 'contact') initContactPage();

        currentRoute = route;
        highlightNav(route);
        updateUrl(route);
      } catch (err) {
        contentEl.innerHTML = `<div class="text-center text-muted py-12">Failed to load content.</div>`;
      }
      contentEl.classList.remove('swapping');
    }

    function navigateTo(route) {
      if (route === currentRoute) return;
      loadContent(route);
    }

    function updateUrl(route) {
      const path = route === DEFAULT_ROUTE ? '/' : '/' + route;
      history.pushState({ route }, '', path);
    }

    window.addEventListener('popstate', (e) => {
      const route = e.state?.route || DEFAULT_ROUTE;
      if (route !== currentRoute) loadContent(route);
    });

    // ─── TOGGLE MENU ──────────────────────────────────────────────────────
    window.toggleMenu = function() {
      const menu = document.getElementById('mobile-menu');
      const overlay = document.getElementById('mobile-overlay');
      if (!menu) return;
      const hidden = menu.classList.contains('-translate-x-full');
      if (hidden) {
        menu.classList.remove('-translate-x-full');
        menu.classList.add('translate-x-0');
        if (overlay) overlay.classList.remove('hidden');
        document.body.style.overflow = 'hidden';
      } else {
        menu.classList.remove('translate-x-0');
        menu.classList.add('-translate-x-full');
        if (overlay) overlay.classList.add('hidden');
        document.body.style.overflow = '';
      }
    };

    document.addEventListener('click', function(e) {
      const menu = document.getElementById('mobile-menu');
      if (!menu) return;
      const link = e.target.closest('#mobile-menu a');
      if (link && window.innerWidth < 768) {
        menu.classList.remove('translate-x-0');
        menu.classList.add('-translate-x-full');
        const overlay = document.getElementById('mobile-overlay');
        if (overlay) overlay.classList.add('hidden');
        document.body.style.overflow = '';
      }
    });

    let resizeTimer;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimer);
      resizeTimer = setTimeout(() => {
        const menu = document.getElementById('mobile-menu');
        const overlay = document.getElementById('mobile-overlay');
        if (!menu) return;
        if (window.innerWidth >= 768) {
          menu.classList.remove('-translate-x-full');
          menu.classList.add('translate-x-0');
          if (overlay) overlay.classList.add('hidden');
          document.body.style.overflow = '';
        } else {
          if (!menu.classList.contains('translate-x-0')) {
            menu.classList.add('-translate-x-full');
            menu.classList.remove('translate-x-0');
            if (overlay) overlay.classList.add('hidden');
          }
        }
      }, 200);
    });

    // ─── PARTICLES ──────────────────────────────────────────────────────
    if (window.particlesJS) {
      particlesJS("particles-js", {
        particles: {
          number: { value: 100, density: { enable: true, value_area: 800 } },
          color: { value: "#60a5fa" },
          shape: { type: "circle" },
          opacity: { value: 0.6 },
          size: { value: 3, random: true },
          line_linked: { enable: true, distance: 120, color: "#60a5fa", opacity: 0.12, width: 1 },
          move: { enable: true, speed: 1.5, out_mode: "out" },
        },
        interactivity: {
          detect_on: "window",
          events: { onhover: { enable: true, mode: "repulse" } },
          modes: { repulse: { distance: 100 } },
        },
        retina_detect: true,
      });
    }

    // ─── PROJECTS PAGE LOGIC (global) ────────────────────────────────────
    function initProjectsPage() {
      const modDetails = {
        longdrive: {
          title: "The Long Drive – Custom Car",
          engine: "Unity · C# · AssetBundles",
          video: "./Projects/fiverr/longdrive/endresult.mp4",
          reviewImage: "./Projects/fiverr/longdrive/review.jpeg",
          description: `
            <p>For <strong>The Long Drive</strong> I made a fully working custom car. I used <strong>C#</strong>, <strong>Unity AssetBundles</strong> and <strong>stripped in-game scripts</strong> to get the car into the game.</p>
            <p>What I did:</p>
            <ul class="list-disc list-inside space-y-1 text-muted">
              <li><strong>AssetBundles</strong> — The car is packed as an AssetBundle so it can be loaded dynamically without modifying the game itself.</li>
              <li><strong>Stripped scripts</strong> — I stripped down the existing game scripts to the core and adapted them so the custom car just works with the game logic.</li>
              <li><strong>Physics</strong> — Chassis and wheels with custom colliders, mass distribution and suspension. Feels the same as the original cars.</li>
              <li><strong>Engine & sound</strong> — Torque, RPM and sound that reacts to speed and load.</li>
              <li><strong>Custom textures</strong> — You can add your own colors and parts.</li>
            </ul>
            <p>The mod is fully tested and works seamlessly in the game. No crashes, no weird bugs — just a working custom car.</p>
          `,
          tags: ["Unity", "C#", "AssetBundles", "Physics", "Vehicles"],
          extra: "⭐ 5.0 · 1 review · Commissioned for a single client"
        }
      };

      let _lbItems = [];
      let _lbIndex = 0;
      let _currentModKey = null;

      function _buildLightboxItems(modKey) {
        const data = modDetails[modKey];
        if (!data) return [];
        const items = [];
        if (data.video) items.push({ src: data.video, isVideo: true, caption: '🎬 Final Result — The Long Drive Custom Car' });
        if (data.reviewImage) items.push({ src: data.reviewImage, isVideo: false, caption: '⭐ Review — 5.0 stars' });
        return items;
      }

      function _renderLightboxContent(index) {
        const wrap = document.getElementById('lb-media-wrap');
        const cap = document.getElementById('lb-caption');
        const counter = document.getElementById('lb-counter');
        const oldVid = wrap.querySelector('video');
        if (oldVid) oldVid.pause();
        wrap.innerHTML = '';
        const info = _lbItems[index];
        if (!info) return;
        if (info.isVideo) {
          const video = document.createElement('video');
          video.src = info.src;
          video.autoplay = true;
          video.controls = true;
          video.muted = false;
          video.loop = true;
          video.className = 'w-full rounded-lg shadow-2xl border border-white/10 cursor-default object-contain';
          video.style.maxHeight = '84vh';
          wrap.appendChild(video);
        } else {
          const img = document.createElement('img');
          img.src = info.src;
          img.className = 'object-contain rounded-lg shadow-2xl border border-white/10 cursor-default mx-auto block';
          img.style.maxHeight = '84vh';
          img.style.maxWidth = '100%';
          wrap.appendChild(img);
        }
        cap.textContent = info.caption || '';
        counter.textContent = (index + 1) + ' / ' + _lbItems.length;
        document.getElementById('lb-prev').style.opacity = index === 0 ? '0.3' : '1';
        document.getElementById('lb-next').style.opacity = index === _lbItems.length - 1 ? '0.3' : '1';
      }

      window.openLightboxFromModal = function(type) {
        if (!_currentModKey) return;
        const data = modDetails[_currentModKey];
        if (!data) return;
        _lbItems = _buildLightboxItems(_currentModKey);
        if (_lbItems.length === 0) return;
        let idx = 0;
        if (type === 'video') idx = _lbItems.findIndex(item => item.isVideo === true);
        else if (type === 'review') idx = _lbItems.findIndex(item => item.isVideo === false);
        if (idx === -1) idx = 0;
        _lbIndex = idx;
        const lb = document.getElementById('lightbox');
        lb.classList.remove('hidden');
        lb.classList.add('flex');
        _renderLightboxContent(_lbIndex);
      };

      window.closeLightbox = function() {
        const lb = document.getElementById('lightbox');
        const v = lb.querySelector('video');
        if (v) v.pause();
        lb.classList.add('hidden');
        lb.classList.remove('flex');
        document.getElementById('lb-media-wrap').innerHTML = '';
      };

      window.lbNav = function(dir) {
        const next = _lbIndex + dir;
        if (next < 0 || next >= _lbItems.length) return;
        _lbIndex = next;
        _renderLightboxContent(_lbIndex);
      };

      window.openModal = function(modKey) {
        const data = modDetails[modKey];
        if (!data) return;
        _currentModKey = modKey;
        document.getElementById('modalTitle').textContent = data.title;
        document.getElementById('modalEngine').textContent = data.engine;
        document.getElementById('modalDescription').innerHTML = data.description;

        const vc = document.getElementById('modalVideoContainer');
        const video = document.getElementById('modalVideo');
        if (data.video) {
          const source = video.querySelector('source');
          source.src = data.video;
          video.load();
          vc.classList.remove('hidden');
        } else {
          vc.classList.add('hidden');
        }

        const rc = document.getElementById('modalReviewContainer');
        const img = document.getElementById('modalReviewImage');
        if (data.reviewImage) {
          img.src = data.reviewImage;
          rc.classList.remove('hidden');
        } else {
          rc.classList.add('hidden');
        }

        const tags = document.getElementById('modalTags');
        tags.innerHTML = '';
        data.tags.forEach(tag => {
          const span = document.createElement('span');
          span.className = 'text-[10px] px-2.5 py-1 bg-white/5 border border-white/10 rounded-full text-muted';
          span.textContent = tag;
          tags.appendChild(span);
        });
        document.getElementById('modalExtra').textContent = data.extra || '';
        document.getElementById('modModal').classList.remove('hidden');
        document.body.style.overflow = 'hidden';
      };

      window.closeModal = function() {
        const vid = document.getElementById('modalVideo');
        if (vid) vid.pause();
        document.getElementById('modModal').classList.add('hidden');
        document.body.style.overflow = '';
      };

      // bind cards
      document.querySelectorAll('.mod-card[data-mod]').forEach(card => {
        card.addEventListener('click', function(e) {
          if (e.target.closest('a')) return;
          window.openModal(this.dataset.mod);
        });
      });

      // modal backdrop
      document.getElementById('modModal').addEventListener('click', function(e) {
        if (e.target === this) window.closeModal();
      });

      // lightbox backdrop
      document.getElementById('lightbox').addEventListener('click', function(e) {
        if (e.target === this) window.closeLightbox();
      });

      // keyboard
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
          const modal = document.getElementById('modModal');
          if (!modal.classList.contains('hidden')) window.closeModal();
          const lb = document.getElementById('lightbox');
          if (!lb.classList.contains('hidden')) window.closeLightbox();
        }
        if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
          const lb = document.getElementById('lightbox');
          if (!lb.classList.contains('hidden')) {
            window.lbNav(e.key === 'ArrowLeft' ? -1 : 1);
          }
        }
      });
    }

    // ─── CONTACT PAGE LOGIC (global) ────────────────────────────────────
    function initContactPage() {
      if (typeof emailjs !== 'undefined') {
        emailjs.init("Y7_VfCpY6XSVV9JuV");
        bindContactForm();
      } else {
        const check = setInterval(() => {
          if (typeof emailjs !== 'undefined') {
            clearInterval(check);
            emailjs.init("Y7_VfCpY6XSVV9JuV");
            bindContactForm();
          }
        }, 200);
      }
    }

    function bindContactForm() {
      const form = document.getElementById('contactForm');
      if (!form) return;
      const newForm = form.cloneNode(true);
      form.parentNode.replaceChild(newForm, form);
      newForm.addEventListener('submit', function(e) {
        e.preventDefault();
        const feedback = document.getElementById('formFeedback');
        if (!feedback) return;
        feedback.className = 'mt-4 text-sm text-center text-accent';
        feedback.textContent = '📨 Sending message...';
        emailjs.sendForm('service_k551zka', 'template_jjmglr6', this)
          .then(() => {
            feedback.className = 'mt-4 text-sm text-center text-emerald-400';
            feedback.textContent = 'Thanks! Your message has been sent. I\'ll get back to you as soon as possible.';
            this.reset();
          }, (error) => {
            feedback.className = 'mt-4 text-sm text-center text-red-400';
            feedback.textContent = 'Something went wrong. Please try again later.';
            console.error('Error:', error);
          });
      });
    }

    // ─── STARTUP ──────────────────────────────────────────────────────────
    async function init() {
      await loadSidebar();
      await loadContent(DEFAULT_ROUTE);
    }

    // detect initial route from URL
    (function() {
      const path = window.location.pathname;
      let route = DEFAULT_ROUTE;
      if (path !== '/' && path !== '') {
        const parts = path.split('/').filter(Boolean);
        if (parts.length && ROUTES[parts[0]]) route = parts[0];
      }
      currentRoute = route;
    })();

    init();
  </script>
</body>

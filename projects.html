<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leroy Exel - Projects</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: "#0f1724",
            muted: "#9aa4b2",
            accent: "#60a5fa",
            text: "#e6eef8",
          },
        },
      },
    };
  </script>

  <style>
    @font-face {
      font-family: "RecoilFont";
      src: url("./Projects/RecoilAssets/RecoilFont.TTF") format("truetype");
    }
    .recoil-font {
      font-family: "RecoilFont", sans-serif;
    }

    #sidebar-container {
      display: contents;
    }
  </style>
</head>

<body class="min-h-screen flex font-sans text-white bg-linear-to-b from-[#0f2b72] to-[#071025] text-text relative">

  <!-- Particles background -->
  <div id="particles-js" class="fixed inset-0 z-0 pointer-events-none opacity-90"></div>

  <!-- Mobile menu button -->
  <button id="menuBtn" onclick="toggleMenu()" class="fixed top-4 left-4 z-50 md:hidden bg-white/10 border border-white/10 rounded-xl p-2 backdrop-blur-md text-[#60a5fa]">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  </button>

  <!-- Mobile overlay -->
  <div id="mobile-overlay" onclick="toggleMenu()" class="fixed inset-0 z-30 bg-black/60 backdrop-blur-sm md:hidden hidden"></div>

  <!-- Sidebar will be injected here -->
  <div id="sidebar-container"></div>

  <!-- Main content -->
  <main class="flex-1 flex items-center justify-center p-12 relative z-20">
    <div class="w-full flex flex-col items-center gap-6">
      <h1 class="text-5xl font-bold mb-8">Projects</h1>

      <!-- Projects Grid -->
      <div class="w-full max-w-6xl grid grid-cols-1 gap-6">
        <!-- Project 1: Recoil -->
        <div class="bg-white/5 border border-white/10 rounded-lg p-6 hover:border-accent hover:bg-white/10 transition-all cursor-pointer">
          <div class="flex flex-col md:flex-row gap-4 md:items-start">
            <div class="flex-1">
              <h3 class="text-2xl font-bold text-accent mb-2">Recoil</h3>
              <p class="text-muted text-sm">School project using bullet force to shoot yourself up and kill enemies</p>
              <p class="text-muted text-sm mt-4 mb-8">
                <a href="https://github.com/LeroyExel/Recoil" target="_blank" rel="noopener noreferrer" class="text-sky-400 hover:underline">See GitHub →</a>
              </p>
            </div>
            <p class="font-bold recoil-font text-5xl md:text-5xl mt-8 text-blue-400 md:flex-shrink-0">RECOIL</p>
          </div>
        </div>

        <!-- Project 2: PhysicsGame -->
        <div class="bg-white/5 border border-white/10 rounded-lg p-6 hover:border-accent hover:bg-white/10 transition-all cursor-pointer">
          <div class="flex flex-col md:flex-row gap-4 md:items-start">
            <div class="flex-1">
              <h3 class="text-xl font-bold text-accent mb-2">PhysicsGame</h3>
              <p class="text-muted text-sm">Fully physics driven characters using my own physics animation system.</p>
              <p class="text-muted text-sm mt-4">
                <a href="https://github.com/LeroyExel/Physics-Based-Character/tree/main" target="_blank" rel="noopener noreferrer" class="text-sky-400 hover:underline">See GitHub →</a>
              </p>
            </div>
            <img src="https://raw.githubusercontent.com/LeroyExel/Physics-Based-Character/main/ExamplePicture.png" alt="PhysicsGame Preview" class="rounded-md border border-white/10 w-full md:w-64 md:h-32 h-40 object-cover md:flex-shrink-0">
          </div>
        </div>

        <!-- Project 3: GOPO -->
        <div class="bg-white/5 border border-white/10 rounded-lg p-6 hover:border-accent hover:bg-white/10 transition-all cursor-pointer">
          <div class="flex flex-col md:flex-row gap-4 md:items-start">
            <div class="flex-1">
              <h3 class="text-xl font-bold text-accent mb-2">GOPO</h3>
              <p class="text-muted text-sm">Physics based Pogostick game.</p>
              <p class="text-muted text-sm mt-4">
                <a href="https://github.com/LeroyExel/Gopo-PogoStick-" target="_blank" rel="noopener noreferrer" class="text-sky-400 hover:underline">See GitHub →</a>
              </p>
            </div>
            <img src="https://raw.githubusercontent.com/LeroyExel/Gopo-PogoStick-/main/Example.png" alt="Project 3 Preview" class="rounded-md border border-white/10 w-full md:w-64 md:h-32 h-40 object-cover md:flex-shrink-0">
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Sidebar injection + toggle script -->
  <script>
    (function() {
      function getSidebarPath() {
        const path = window.location.pathname;
        if (path.includes('/Projects/') || path.includes('/project/')) {
          return '../sidebar.html';
        }
        return 'sidebar.html';
      }

      fetch(getSidebarPath())
        .then(res => {
          if (!res.ok) throw new Error('Sidebar not found');
          return res.text();
        })
        .then(html => {
          document.getElementById('sidebar-container').innerHTML = html;
          const currentPath = window.location.pathname.split('/').pop() || 'projects.html';
          document.querySelectorAll('#mobile-menu a[href]').forEach(link => {
            const href = link.getAttribute('href');
            if (href === currentPath) {
              link.classList.add('text-accent', 'bg-white/5');
              link.classList.remove('text-muted');
            } else {
              link.classList.remove('text-accent', 'bg-white/5');
              link.classList.add('text-muted');
            }
          });
        })
        .catch(err => console.warn('Sidebar injection failed:', err));

      window.toggleMenu = function() {
        const menu = document.getElementById('mobile-menu');
        const overlay = document.getElementById('mobile-overlay');
        if (!menu) return;
        const isHidden = menu.classList.contains('-translate-x-full');
        if (isHidden) {
          menu.classList.remove('-translate-x-full');
          menu.classList.add('translate-x-0');
          if (overlay) overlay.classList.remove('hidden');
          document.body.style.overflow = 'hidden';
        } else {
          menu.classList.remove('translate-x-0');
          menu.classList.add('-translate-x-full');
          if (overlay) overlay.classList.add('hidden');
          document.body.style.overflow = '';
        }
      };

      const overlay = document.getElementById('mobile-overlay');
      if (overlay) {
        overlay.addEventListener('click', toggleMenu);
      }

      document.addEventListener('click', function(e) {
        const menu = document.getElementById('mobile-menu');
        if (!menu) return;
        const link = e.target.closest('#mobile-menu a');
        if (link && window.innerWidth < 768) {
          menu.classList.remove('translate-x-0');
          menu.classList.add('-translate-x-full');
          if (overlay) overlay.classList.add('hidden');
          document.body.style.overflow = '';
        }
      });

      let resizeTimer;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          const menu = document.getElementById('mobile-menu');
          const overlay = document.getElementById('mobile-overlay');
          if (!menu) return;
          if (window.innerWidth >= 768) {
            menu.classList.remove('-translate-x-full');
            menu.classList.add('translate-x-0');
            if (overlay) overlay.classList.add('hidden');
            document.body.style.overflow = '';
          } else {
            if (!menu.classList.contains('translate-x-0')) {
              menu.classList.add('-translate-x-full');
              menu.classList.remove('translate-x-0');
              if (overlay) overlay.classList.add('hidden');
            }
          }
        }, 200);
      });
    })();

    if (window.particlesJS) {
      particlesJS("particles-js", {
        particles: {
          number: { value: 100, density: { enable: true, value_area: 800 } },
          color: { value: "#60a5fa" },
          shape: { type: "circle" },
          opacity: { value: 0.6 },
          size: { value: 3, random: true },
          line_linked: { enable: true, distance: 120, color: "#60a5fa", opacity: 0.12, width: 1 },
          move: { enable: true, speed: 1.5, out_mode: "out" },
        },
        interactivity: {
          detect_on: "window",
          events: { onhover: { enable: true, mode: "repulse" } },
          modes: { repulse: { distance: 100 } },
        },
        retina_detect: true,
      });
    }
  </script>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leroy Exel - Portfolio</title>

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            bg: '#0f1724',
            muted: '#9aa4b2',
            accent: '#60a5fa',
            text: '#e6eef8'
          }
        }
      }
    }
  </script>

  <style>
    #sidebar-container {
      display: contents;
    }
  </style>
</head>

<body class="min-h-screen flex font-sans text-white bg-linear-to-b from-[#0f2b72] to-[#071025] text-text relative">

  <div id="particles-js" class="fixed inset-0 z-0 pointer-events-none opacity-90"></div>

  <button id="menuBtn" onclick="toggleMenu()" class="fixed top-4 left-4 z-50 md:hidden bg-white/10 border border-white/10 rounded-xl p-2 backdrop-blur-md text-[#60a5fa]">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
    </svg>
  </button>

  <div id="mobile-overlay" onclick="toggleMenu()" class="fixed inset-0 z-30 bg-black/60 backdrop-blur-sm md:hidden hidden"></div>

  <!-- Sidebar will be injected here -->
  <div id="sidebar-container"></div>

  <main class="flex-1 flex items-center justify-center p-6 md:p-12 relative z-20">
    <div class="max-w-xl text-center p-8 bg-transparent flex flex-col items-center gap-6">
      <img src="Assets/Profile.jpg" alt="Leroy Exel" class="w-44 h-44 rounded-full border-2 border-accent mb-4 object-cover">
      <h1 class="text-3xl font-semibold mb-2">Leroy Exel</h1>
      <p class="text-muted">Software Developer — Enschede.</p>
    </div>
  </main>

  <script>
    (function() {
      function getSidebarPath() {
        const path = window.location.pathname;
        if (path.includes('/Projects/') || path.includes('/project/')) {
          return '../sidebar.html';
        }
        return 'sidebar.html';
      }

      fetch(getSidebarPath())
        .then(res => {
          if (!res.ok) throw new Error('Sidebar not found');
          return res.text();
        })
        .then(html => {
          document.getElementById('sidebar-container').innerHTML = html;
          const currentPath = window.location.pathname.split('/').pop() || 'main.html';
          document.querySelectorAll('#mobile-menu a[href]').forEach(link => {
            const href = link.getAttribute('href');
            if (href === currentPath) {
              link.classList.add('text-accent', 'bg-white/5');
              link.classList.remove('text-muted');
            } else {
              link.classList.remove('text-accent', 'bg-white/5');
              link.classList.add('text-muted');
            }
          });
        })
        .catch(err => console.warn('Sidebar injection failed:', err));

      window.toggleMenu = function() {
        const menu = document.getElementById('mobile-menu');
        const overlay = document.getElementById('mobile-overlay');
        if (!menu) return;
        const isHidden = menu.classList.contains('-translate-x-full');
        if (isHidden) {
          menu.classList.remove('-translate-x-full');
          menu.classList.add('translate-x-0');
          if (overlay) overlay.classList.remove('hidden');
          document.body.style.overflow = 'hidden';
        } else {
          menu.classList.remove('translate-x-0');
          menu.classList.add('-translate-x-full');
          if (overlay) overlay.classList.add('hidden');
          document.body.style.overflow = '';
        }
      };

      const overlay = document.getElementById('mobile-overlay');
      if (overlay) {
        overlay.addEventListener('click', toggleMenu);
      }

      document.addEventListener('click', function(e) {
        const menu = document.getElementById('mobile-menu');
        if (!menu) return;
        const link = e.target.closest('#mobile-menu a');
        if (link && window.innerWidth < 768) {
          menu.classList.remove('translate-x-0');
          menu.classList.add('-translate-x-full');
          if (overlay) overlay.classList.add('hidden');
          document.body.style.overflow = '';
        }
      });

      let resizeTimer;
      window.addEventListener('resize', () => {
        clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
          const menu = document.getElementById('mobile-menu');
          const overlay = document.getElementById('mobile-overlay');
          if (!menu) return;
          if (window.innerWidth >= 768) {
            menu.classList.remove('-translate-x-full');
            menu.classList.add('translate-x-0');
            if (overlay) overlay.classList.add('hidden');
            document.body.style.overflow = '';
          } else {
            if (!menu.classList.contains('translate-x-0')) {
              menu.classList.add('-translate-x-full');
              menu.classList.remove('translate-x-0');
              if (overlay) overlay.classList.add('hidden');
            }
          }
        }, 200);
      });
    })();

    if (window.particlesJS) {
      particlesJS('particles-js', {
        particles: {
          number: { value: 100, density: { enable: true, value_area: 800 } },
          color: { value: '#60a5fa' },
          shape: { type: 'circle' },
          opacity: { value: 0.6 },
          size: { value: 3, random: true },
          line_linked: { enable: true, distance: 120, color: '#60a5fa', opacity: 0.12, width: 1 },
          move: { enable: true, speed: 1.5, out_mode: 'out' }
        },
        interactivity: {
          detect_on: 'window',
          events: { onhover: { enable: true, mode: 'repulse' } },
          modes: { repulse: { distance: 100 } }
        },
        retina_detect: true
      });
    }
  </script>

</body>
</html>
